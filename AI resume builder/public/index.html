<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Market CRM</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Stock Market CRM</h1>
      <p>Manage investor relationships, holdings, watchlists, and follow-ups.</p>
    </header>

    <main>
      <section class="cards" id="dashboardCards"></section>

      <section class="panel">
        <h2>Add Client</h2>
        <form id="clientForm" class="grid-form">
          <input type="text" id="name" placeholder="Client Name" required />
          <input type="email" id="email" placeholder="Email" />
          <input type="text" id="phone" placeholder="Phone" />
          <select id="segment">
            <option>Retail</option>
            <option>HNI</option>
            <option>Institutional</option>
          </select>
          <select id="riskProfile">
            <option>Conservative</option>
            <option>Moderate</option>
            <option>Aggressive</option>
          </select>
          <input type="text" id="preferredSectors" placeholder="Preferred sectors (comma-separated)" />
          <input type="text" id="watchlist" placeholder="Watchlist symbols (comma-separated)" />
          <textarea id="holdings" placeholder='Holdings JSON: [{"symbol":"RELIANCE","qty":10,"avgPrice":2800}]'></textarea>
          <textarea id="notes" placeholder="Notes"></textarea>
          <button type="submit">Save Client</button>
        </form>
      </section>

      <section class="panel">
        <h2>Clients</h2>
        <div class="filters">
          <input type="text" id="searchInput" placeholder="Search by name, email, symbol" />
          <select id="riskFilter">
            <option value="">All Risk Profiles</option>
            <option value="Conservative">Conservative</option>
            <option value="Moderate">Moderate</option>
            <option value="Aggressive">Aggressive</option>
          </select>
        </div>
        <div id="clientsList" class="list"></div>
      </section>

      <section class="panel two-col">
        <div>
          <h2>Log Interaction</h2>
          <form id="interactionForm" class="stack-form">
            <select id="interactionClient" required></select>
            <select id="interactionType">
              <option>Call</option>
              <option>Email</option>
              <option>Meeting</option>
              <option>Note</option>
            </select>
            <textarea id="interactionSummary" placeholder="Summary" required></textarea>
            <button type="submit">Add Interaction</button>
          </form>
          <div id="interactionsList" class="list compact"></div>
        </div>

        <div>
          <h2>Create Task</h2>
          <form id="taskForm" class="stack-form">
            <select id="taskClient" required></select>
            <input type="text" id="taskTitle" placeholder="Task title" required />
            <input type="date" id="taskDueDate" />
            <select id="taskPriority">
              <option>Low</option>
              <option selected>Medium</option>
              <option>High</option>
            </select>
            <button type="submit">Add Task</button>
          </form>
          <div id="tasksList" class="list compact"></div>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
